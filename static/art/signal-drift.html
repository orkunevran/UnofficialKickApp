<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal Drift — Generative Art</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }

        .container {
            display: flex;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        .sidebar {
            width: 320px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar h1 {
            font-family: 'Lora', serif;
            font-size: 24px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .sidebar .subtitle {
            color: var(--anthropic-mid-gray);
            font-size: 14px;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .control-section { margin-bottom: 32px; }

        .control-section h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--anthropic-dark);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .control-section h3::before {
            content: '•';
            color: var(--anthropic-orange);
            font-weight: bold;
        }

        .seed-input {
            width: 100%;
            background: var(--anthropic-light);
            padding: 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin-bottom: 12px;
            border: 1px solid var(--anthropic-light-gray);
            text-align: center;
        }
        .seed-input:focus {
            outline: none;
            border-color: var(--anthropic-orange);
            box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.1);
            background: white;
        }

        .seed-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .control-group { margin-bottom: 20px; }
        .control-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slider-container input[type="range"] {
            flex: 1;
            height: 4px;
            background: var(--anthropic-light-gray);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }
        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px; height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            background: #c86641;
        }
        .slider-container input[type="range"]::-moz-range-thumb {
            width: 16px; height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }

        .value-display {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            min-width: 60px;
            text-align: right;
        }

        .color-group { margin-bottom: 16px; }
        .color-group label {
            display: block;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            margin-bottom: 4px;
        }
        .color-picker-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .color-picker-container input[type="color"] {
            width: 32px; height: 32px;
            border: none; border-radius: 6px;
            cursor: pointer; background: none; padding: 0;
        }
        .color-value {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 16px;
            border: 1px solid var(--anthropic-light-gray);
            border-radius: 8px;
            background: white;
            color: var(--anthropic-dark);
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }
        .button:hover {
            border-color: var(--anthropic-orange);
            color: var(--anthropic-orange);
            background: rgba(217, 119, 87, 0.05);
        }
        .button.primary {
            background: var(--anthropic-orange);
            color: white;
            border-color: var(--anthropic-orange);
        }
        .button.primary:hover {
            background: #c86641;
            border-color: #c86641;
        }

        .button-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .button-row .button { flex: 1; }

        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #canvas-container {
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(20, 20, 19, 0.15);
            background: #0b0e14;
        }
        #canvas-container canvas { display: block; }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 800px; height: 800px;
            color: var(--anthropic-mid-gray);
            font-size: 14px;
        }

        @media (max-width: 900px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Signal Drift</h1>
            <p class="subtitle">The invisible architecture of live connection — signal propagating through noise, attention crystallizing from chaos.</p>

            <!-- Seed Section -->
            <div class="control-section">
                <h3>Seed</h3>
                <input type="text" id="seed-input" class="seed-input" value="12345" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button" onclick="previousSeed()">← Prev</button>
                    <button class="button" onclick="nextSeed()">Next →</button>
                    <button class="button" onclick="randomSeedAndUpdate()">Random</button>
                    <button class="button primary regen-button" onclick="initializeSystem()">Regenerate</button>
                </div>
            </div>

            <!-- Parameters -->
            <div class="control-section">
                <h3>Parameters</h3>

                <div class="control-group">
                    <label>Particle Count</label>
                    <div class="slider-container">
                        <input type="range" id="particleCount" min="500" max="8000" step="100" value="3000" oninput="updateParam('particleCount', this.value)">
                        <span class="value-display" id="particleCount-value">3000</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Turbulence</label>
                    <div class="slider-container">
                        <input type="range" id="turbulence" min="0.5" max="5.0" step="0.1" value="2.2" oninput="updateParam('turbulence', this.value)">
                        <span class="value-display" id="turbulence-value">2.2</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Drift Speed</label>
                    <div class="slider-container">
                        <input type="range" id="driftSpeed" min="0.2" max="3.0" step="0.1" value="1.0" oninput="updateParam('driftSpeed', this.value)">
                        <span class="value-display" id="driftSpeed-value">1.0</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Broadcast Radius</label>
                    <div class="slider-container">
                        <input type="range" id="broadcastRadius" min="20" max="200" step="5" value="80" oninput="updateParam('broadcastRadius', this.value)">
                        <span class="value-display" id="broadcastRadius-value">80</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Noise Scale</label>
                    <div class="slider-container">
                        <input type="range" id="noiseScale" min="0.001" max="0.012" step="0.001" value="0.004" oninput="updateParam('noiseScale', this.value)">
                        <span class="value-display" id="noiseScale-value">0.004</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Curvature Sensitivity</label>
                    <div class="slider-container">
                        <input type="range" id="curvatureSens" min="0.1" max="3.0" step="0.1" value="1.2" oninput="updateParam('curvatureSens', this.value)">
                        <span class="value-display" id="curvatureSens-value">1.2</span>
                    </div>
                </div>
            </div>

            <!-- Colors -->
            <div class="control-section">
                <h3>Colors</h3>
                <div class="color-group">
                    <label>Cool Signal</label>
                    <div class="color-picker-container">
                        <input type="color" id="color1" value="#53fc18" onchange="updateColor('color1', this.value)">
                        <span class="color-value" id="color1-value">#53fc18</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>Warm Noise</label>
                    <div class="color-picker-container">
                        <input type="color" id="color2" value="#ff3366" onchange="updateColor('color2', this.value)">
                        <span class="color-value" id="color2-value">#ff3366</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>Background</label>
                    <div class="color-picker-container">
                        <input type="color" id="color3" value="#0b0e14" onchange="updateColor('color3', this.value)">
                        <span class="color-value" id="color3-value">#0b0e14</span>
                    </div>
                </div>
            </div>

            <!-- Actions -->
            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row">
                    <button class="button" onclick="resetParameters()">Reset</button>
                    <button class="button" onclick="downloadArt()">Download PNG</button>
                </div>
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Initializing Signal Drift...</div>
            </div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════════
        // SIGNAL DRIFT — Parameters
        // ═══════════════════════════════════════════════════════════════

        let params = {
            seed: 12345,
            particleCount: 3000,
            turbulence: 2.2,
            driftSpeed: 1.0,
            broadcastRadius: 80,
            noiseScale: 0.004,
            curvatureSens: 1.2,
            colorCool: '#53fc18',
            colorWarm: '#ff3366',
            colorBg: '#0b0e14'
        };

        let defaultParams = JSON.parse(JSON.stringify(params));

        // ═══════════════════════════════════════════════════════════════
        // SIGNAL DRIFT — Core Algorithm
        // ═══════════════════════════════════════════════════════════════

        let particles = [];
        let frameCount_ = 0;
        const SIZE = 800;
        const MAX_FRAMES = 600;
        let isRunning = true;

        function setup() {
            let canvas = createCanvas(SIZE, SIZE);
            canvas.parent('canvas-container');
            pixelDensity(1);
            initializeSystem();
            document.querySelector('.loading').style.display = 'none';
        }

        function initializeSystem() {
            randomSeed(params.seed);
            noiseSeed(params.seed);

            particles = [];
            frameCount_ = 0;
            isRunning = true;

            // Parse colors
            let bg = color(params.colorBg);
            background(bg);

            // Spawn particles from the broadcast origin
            let cx = SIZE / 2;
            let cy = SIZE / 2;
            let r = params.broadcastRadius;

            for (let i = 0; i < params.particleCount; i++) {
                let angle = random(TWO_PI);
                let dist = random(r * 0.1, r);
                let px = cx + cos(angle) * dist;
                let py = cy + sin(angle) * dist;
                particles.push(new Drifter(px, py, i));
            }
        }

        function draw() {
            if (!isRunning) return;
            if (frameCount_ > MAX_FRAMES) {
                isRunning = false;
                return;
            }

            let t = frameCount_ * 0.002;

            for (let p of particles) {
                if (!p.alive) continue;
                p.update(t);
                p.display();
            }

            frameCount_++;
        }

        // ═══════════════════════════════════════════════════════════════
        // DRIFTER — Particle Class
        //
        // Each drifter is a viewer connection propagating outward from
        // the broadcast origin through a dual-layer noise field.
        // Color is determined by accumulated path curvature.
        // Opacity by velocity. Trails by persistence.
        // ═══════════════════════════════════════════════════════════════

        class Drifter {
            constructor(x, y, index) {
                this.pos = createVector(x, y);
                this.prev = this.pos.copy();
                this.vel = createVector(0, 0);
                this.alive = true;
                this.age = 0;
                this.maxAge = floor(random(200, MAX_FRAMES));
                this.curvature = 0;       // accumulated path curvature
                this.prevAngle = 0;
                this.phase = (index / params.particleCount) * TWO_PI;
                this.weight = random(0.4, 1.8);
            }

            update(t) {
                this.age++;
                if (this.age > this.maxAge || this.isOutOfBounds()) {
                    this.alive = false;
                    return;
                }

                this.prev = this.pos.copy();

                // Dual-layer noise field
                let ns = params.noiseScale;
                let turb = params.turbulence;

                // Layer 1: slow geological field
                let n1 = noise(this.pos.x * ns, this.pos.y * ns, t * 0.3) * TWO_PI * turb;
                // Layer 2: fast volatile field
                let n2 = noise(
                    this.pos.x * ns * 3 + 1000,
                    this.pos.y * ns * 3 + 1000,
                    t * 1.5 + this.phase
                ) * TWO_PI * turb * 0.4;

                let angle = n1 + n2;

                // Outward drift from center
                let toCenter = createVector(SIZE / 2 - this.pos.x, SIZE / 2 - this.pos.y);
                let distFromCenter = toCenter.mag();
                let driftAngle = toCenter.heading() + PI; // away from center
                let driftInfluence = map(distFromCenter, 0, SIZE * 0.5, 0.4, 0.05, true);

                angle = lerp(angle, driftAngle, driftInfluence);

                // Accumulate curvature
                let angleDelta = abs(angle - this.prevAngle);
                if (angleDelta > PI) angleDelta = TWO_PI - angleDelta;
                this.curvature += angleDelta * params.curvatureSens;
                this.prevAngle = angle;

                // Velocity
                let speed = params.driftSpeed * map(this.age, 0, this.maxAge, 1.2, 0.3);
                this.vel.set(cos(angle) * speed, sin(angle) * speed);
                this.pos.add(this.vel);
            }

            display() {
                // Color from curvature: low curvature → cool, high → warm
                let coolC = color(params.colorCool);
                let warmC = color(params.colorWarm);
                let curvNorm = constrain(this.curvature / (this.age * 0.08 + 1), 0, 1);
                let c = lerpColor(coolC, warmC, curvNorm);

                // Opacity from velocity magnitude and age
                let speed = this.vel.mag();
                let speedAlpha = map(speed, 0, params.driftSpeed * 1.5, 30, 8, true);
                let ageAlpha = map(this.age, 0, this.maxAge, 1.0, 0.15);
                let finalAlpha = speedAlpha * ageAlpha;

                stroke(red(c), green(c), blue(c), finalAlpha);
                strokeWeight(this.weight);
                line(this.prev.x, this.prev.y, this.pos.x, this.pos.y);
            }

            isOutOfBounds() {
                let m = -20;
                return this.pos.x < m || this.pos.x > SIZE - m ||
                       this.pos.y < m || this.pos.y > SIZE - m;
            }
        }

        // ═══════════════════════════════════════════════════════════════
        // UI Control Handlers
        // ═══════════════════════════════════════════════════════════════

        function updateParam(name, value) {
            let numVal = parseFloat(value);
            if (name === 'particleCount') numVal = parseInt(value);
            params[name] = numVal;
            document.getElementById(name + '-value').textContent = value;
            initializeSystem();
        }

        function updateColor(id, value) {
            document.getElementById(id + '-value').textContent = value;
            if (id === 'color1') params.colorCool = value;
            else if (id === 'color2') params.colorWarm = value;
            else if (id === 'color3') params.colorBg = value;
            initializeSystem();
        }

        // ═══════════════════════════════════════════════════════════════
        // Seed Controls
        // ═══════════════════════════════════════════════════════════════

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let input = document.getElementById('seed-input');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                initializeSystem();
            } else {
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            initializeSystem();
        }

        function nextSeed() {
            params.seed = params.seed + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function resetParameters() {
            params = JSON.parse(JSON.stringify(defaultParams));

            document.getElementById('particleCount').value = params.particleCount;
            document.getElementById('particleCount-value').textContent = params.particleCount;
            document.getElementById('turbulence').value = params.turbulence;
            document.getElementById('turbulence-value').textContent = params.turbulence;
            document.getElementById('driftSpeed').value = params.driftSpeed;
            document.getElementById('driftSpeed-value').textContent = params.driftSpeed;
            document.getElementById('broadcastRadius').value = params.broadcastRadius;
            document.getElementById('broadcastRadius-value').textContent = params.broadcastRadius;
            document.getElementById('noiseScale').value = params.noiseScale;
            document.getElementById('noiseScale-value').textContent = params.noiseScale;
            document.getElementById('curvatureSens').value = params.curvatureSens;
            document.getElementById('curvatureSens-value').textContent = params.curvatureSens;

            document.getElementById('color1').value = params.colorCool;
            document.getElementById('color1-value').textContent = params.colorCool;
            document.getElementById('color2').value = params.colorWarm;
            document.getElementById('color2-value').textContent = params.colorWarm;
            document.getElementById('color3').value = params.colorBg;
            document.getElementById('color3-value').textContent = params.colorBg;

            updateSeedDisplay();
            initializeSystem();
        }

        function downloadArt() {
            saveCanvas('signal-drift-' + params.seed, 'png');
        }

        window.addEventListener('load', function() {
            updateSeedDisplay();
        });
    </script>
</body>
</html>
