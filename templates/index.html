<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="color-scheme" content="dark">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Check live status and browse VODs from your favorite Kick.com channels. Unofficial Kick proxy app.">
    <meta name="theme-color" content="#0b0e14">
    <title>Kick App</title>
    <link rel="icon" href="{{ url_for('static', filename='Kick_logo.svg') }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        kick: '#53fc18',
                        'kick-dark': '#4ce516',
                        surface: 'rgba(20, 24, 32, 0.6)',
                        'surface-hover': 'rgba(30, 35, 45, 0.8)',
                        void: '#0b0e14',
                        'void-light': '#111620',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css', v='2.3.7') }}">
</head>
<body class="bg-void text-white font-sans min-h-screen overflow-hidden">
    <div id="app" class="flex h-screen">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <a href="#/browse" class="sidebar-logo">
                    <img src="{{ url_for('static', filename='Kick_logo.svg') }}" alt="Kick" class="h-6">
                    <span class="sidebar-logo-text">Kick App</span>
                </a>
            </div>

            <nav class="sidebar-nav">
                <a href="#/browse" class="sidebar-link" data-nav-route="/browse">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                    <span class="sidebar-link-text">Browse</span>
                </a>
                <a href="#/favorites" class="sidebar-link" data-nav-route="/favorites">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
                    <span class="sidebar-link-text">Favorites</span>
                    <span id="favorites-badge" class="sidebar-badge hidden">0</span>
                </a>
                <a href="#/history" class="sidebar-link" data-nav-route="/history">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    <span class="sidebar-link-text">History</span>
                </a>
                <a href="#/settings" class="sidebar-link" data-nav-route="/settings">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                    <span class="sidebar-link-text">Settings</span>
                </a>
            </nav>

            <!-- Now Playing indicator -->
            <div id="sidebar-now-playing" class="sidebar-now-playing hidden">
                <div class="now-playing-pulse"></div>
                <span class="sidebar-link-text now-playing-text">Now Playing</span>
            </div>

            <div class="sidebar-footer">
                <a href="/docs" target="_blank" class="sidebar-link sidebar-link-muted" title="API Documentation">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                    <span class="sidebar-link-text">API Docs</span>
                </a>
            </div>
        </aside>

        <!-- Main content area -->
        <div id="main-wrapper" class="flex-1 flex flex-col min-w-0 overflow-hidden">
            <!-- Top bar -->
            <header id="top-bar" class="top-bar">
                <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle sidebar">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>

                <div id="search-container" class="search-container">
                    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <label for="channelSlugInput" class="sr-only">Search channels</label>
                    <input type="text" id="channelSlugInput" placeholder="Search channels..." maxlength="255" autocomplete="off" class="search-input">
                    <kbd class="search-kbd hidden sm:inline-flex">/</kbd>
                    <div id="searchSuggestions" class="search-suggestions" style="display:none;"></div>
                </div>

                <div class="top-bar-actions">
                    <button id="chromecast-button" class="chromecast-btn" title="Chromecast">
                        <img id="chromecast-icon" src="{{ url_for('static', filename='icons/chromecast.svg') }}" alt="Chromecast" class="w-5 h-5">
                    </button>
                    <button id="chromecast-disconnect-quick" class="chromecast-disconnect-quick" title="Disconnect Chromecast" style="display:none" aria-label="Disconnect Chromecast">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
            </header>

            <!-- Scrollable content area -->
            <main id="content-area" class="content-area"></main>

            <!-- Mini player -->
            <div id="mini-player" class="mini-player hidden">
                <div class="mini-player-inner">
                    <div id="mini-player-thumb" class="mini-player-thumb"></div>
                    <div class="mini-player-info">
                        <span id="mini-player-title" class="mini-player-title"></span>
                        <span id="mini-player-channel" class="mini-player-channel"></span>
                    </div>
                    <div class="mini-player-controls">
                        <button id="mini-player-expand" class="mini-player-btn" title="Expand player">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
                        </button>
                        <button id="mini-player-cast" class="mini-player-btn" title="Cast to Chromecast">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 16.1A5 5 0 015.9 20M2 12.05A9 9 0 019.95 20M2 8V6a2 2 0 012-2h16a2 2 0 012 2v12a2 2 0 01-2 2h-6"/><line x1="2" y1="20" x2="2.01" y2="20"/></svg>
                        </button>
                        <button id="mini-player-close" class="mini-player-btn" title="Close player">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                        </button>
                    </div>
                </div>
                <video id="miniPlayerVideo" class="mini-player-video hidden" muted playsinline></video>
            </div>
        </div>
    </div>

    <!-- Mobile bottom nav -->
    <nav id="mobile-nav" class="mobile-nav">
        <a href="#/browse" class="mobile-nav-item" data-nav-route="/browse">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
            <span>Browse</span>
        </a>
        <a href="#/favorites" class="mobile-nav-item" data-nav-route="/favorites">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
            <span>Favorites</span>
        </a>
        <a href="#/history" class="mobile-nav-item" data-nav-route="/history">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span>History</span>
        </a>
        <a href="#/settings" class="mobile-nav-item" data-nav-route="/settings">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
            <span>Settings</span>
        </a>
    </nav>

    <!-- Chromecast Modal -->
    <div id="chromecast-modal" class="modal" role="dialog" aria-labelledby="chromecast-modal-title">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="chromecast-modal-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-3px;margin-right:6px;opacity:0.6"><path d="M2 16.1A5 5 0 015.9 20M2 12.05A9 9 0 019.95 20M2 8V6a2 2 0 012-2h16a2 2 0 012 2v12a2 2 0 01-2 2h-6"/><line x1="2" y1="20" x2="2.01" y2="20"/></svg>Cast to device
                </h2>
                <button class="close-button" role="button" aria-label="Close">&times;</button>
            </div>
            <div id="chromecast-device-list" aria-live="polite"></div>
            <div class="modal-actions">
                <button id="rescan-devices-btn" class="btn-secondary">
                    <svg class="rescan-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
                    <span class="rescan-label">Rescan</span>
                </button>
                <button id="disconnect-device-btn" class="btn-secondary btn-danger" style="display: none;">Disconnect</button>
            </div>
            <details id="chromecast-advanced" class="cc-advanced">
                <summary>Troubleshooting</summary>
                <p class="cc-advanced-help">If automatic discovery fails, enter your Chromecast's IP address or hostname.</p>
                <div class="cc-advanced-row">
                    <label for="chromecast-host-input" class="sr-only">Chromecast IP or hostname</label>
                    <input
                        type="text"
                        id="chromecast-host-input"
                        placeholder="e.g. 192.168.1.100"
                        autocomplete="off"
                        class="search-input cc-advanced-input"
                    >
                    <button id="chromecast-host-discover-btn" class="btn-secondary">Discover</button>
                </div>
            </details>
        </div>
    </div>

    <!-- Toast container -->
    <div id="toast-container" class="toast-container"></div>

    <script defer src="https://cdn.jsdelivr.net/npm/hls.js@1.5.15/dist/hls.min.js"></script>
    <script type="module" src="{{ url_for('static', filename='script.js', v='2.3.7') }}"></script>
</body>
</html>
